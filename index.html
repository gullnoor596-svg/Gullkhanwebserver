<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APK Style Dialog</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #000;
        margin: 0;
    }

    .dialog {
        background: #fff;
        border-radius: 20px;
        width: 350px;
        padding: 20px;
        box-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
        text-align: center;
        position: relative;
        transition: all 0.3s ease;
    }

    .dialog h2 {
        color: #6a00ff;
        margin: 0 0 10px 0;
    }

    .dialog p {
        color: #333;
        font-size: 14px;
        margin: 5px 0;
    }

    .dialog .highlight {
        color: #00d1c1;
    }

    .dialog-buttons {
        display: flex;
        justify-content: space-around;
        margin-top: 20px;
    }

    .btn {
        padding: 10px 20px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        transition: all 0.2s ease;
    }

    .btn-join {
        background-color: #6a00ff;
        color: #fff;
    }

    .btn-join:hover {
        background-color: #5800cc;
    }

    .btn-cancel {
        background-color: #444;
        color: #fff;
    }

    .btn-cancel:hover {
        background-color: #222;
    }
</style>
</head>
<body>

<div class="dialog" id="apkDialog">
    <h2>MODDED BY DPMods</h2>
    <p class="highlight">Join Telegram for more updates</p>
    <p>Thanks For Downloading This Mod<br>if you like it subscribe me on YouTube also 👍</p>
    
    <div class="dialog-buttons">
        <button class="btn btn-join" onclick="window.open('https://t.me/yourchannel', '_blank')">JOIN TELEGRAM</button>
        <button class="btn btn-cancel" onclick="closeDialog()">CANCEL</button>
    </div>
</div>

<script>
function closeDialog() {
    const dialog = document.getElementById('apkDialog');
    dialog.style.display = 'none'; // Hide the dialog
}
</script>

</body>
</html>
