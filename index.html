<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝗚𝗨𝗟𝗟 𝗞𝗛𝗔𝗡 𝗪𝗘𝗕 𝗦𝗘𝗥𝗩𝗘𝗥</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
    --bg-color: #111;
    --text-color: #fff;
    --card-bg: rgba(255,255,255,0.05);
    --highlight-color: #00ff88;
    --search-bg: #222;
    --download-hd: linear-gradient(90deg,#00ff88,#00cc55);
    --download-sd: linear-gradient(90deg,#00ccff,#0066ff);
}
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    overflow-x:hidden;
    transition: background 0.7s ease, color 0.7s ease;
}
/* DRAWER */
.drawer{
    position:fixed;
    top:0;
    left:0;
    width:0;
    height:55%;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(12px);
    overflow:hidden;
    z-index:1000;
    transition:0.4s;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:15px;
    padding-left:0px;
    border-radius:0 25px 300px 0;
}
.drawer::before{
    content:"";
    position:absolute;
    inset:0;
    padding:3px;
    border-radius:0 25px 500px 0;
    background:linear-gradient(270deg,#00ff88,#00ccff,#ff00ff,#00ff88);
    background-size:600% 600%;
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    animation:borderMove 6s linear infinite;
}
@keyframes borderMove{
    0%{background-position:0%}
    100%{background-position:200%}
}
.drawer a{
    padding:15px;
    font-size:40px;
    color: var(--highlight-color);
    text-decoration:none;
    display:block;
    transition:0.5s;
    z-index:1002;
    border-radius:10px;
}
.drawer a:hover{
    background:rgba(0,255,136,0.2);
    color:#fff;
}
.closebtn{
    position:absolute;
    right:15px;
    top:10px;
    font-size:100px;
    cursor:pointer;
    z-index:1003;
}
#openDrawerBtn{
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 60px;
    background: linear-gradient(45deg,#00ff88,#00ccff);
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    z-index:1001;
}
h1{text-align:center;font-size:80px;margin-top:80px;}
.rainbow-text{
    font-weight:bold;
    background:linear-gradient(90deg,red,magenta,blue,cyan,green,yellow,red);
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:100%}100%{background-position:-100%}}
.search-container{text-align:center;margin:20px;}
.search-container input{
    width:600%;
    max-width:700px;
    padding:35px;
    font-size:35px;
    border-radius:15px;
    border:none;
    background: var(--search-bg);
    color: var(--text-color);
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}
.movie{
    background: var(--card-bg);
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    transition:0.7s;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}
.movie img{
    width:100%;
    height:450px;
    object-fit:cover;
}
.movie h3 {
    font-size:30px;
    font-weight:bold;
    color: var(--highlight-color);
    margin:12px 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
.movie.active-touch::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,rgba(255,255,255,0.8),transparent);
    animation:slide 0.5s;
    border-radius:15px;
}
@keyframes slide{from{left:-100%}to{left:100%}}
.download {
    display: block;
    margin: 8px auto 15px auto;
    padding: 10px 45px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 25px;
    text-align:center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.7s ease, background 0.7s ease, color 0.7s ease;
    color:#fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.download.hd {background: var(--download-hd);}
.download.sd {background: var(--download-sd);}
.download:active{transform:scale(0.95);}
.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple-effect 0.6s linear forwards;
    pointer-events:none;
    opacity:0.5;
}
@keyframes ripple-effect{to{transform:scale(6);opacity:0;}}
.fadeIn{opacity:0;transform:translateY(20px);animation:fadeUp 0.6s forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
</style>

    {name:"Puss in Boots (2022)", img:"https://catimages.org/images/2023/01/08/Puss-in-Boots-The-Last-Wish-2022.jpg", link1:"https://pub-0cef6721657649918259091880efe12f.r2.dev/e2714e009c9e6950262793f5f4e76c0f?token=1775201453", link2:"https://mp4moviez.football/dl.php?id=29464&q=720&jio=yes&title=Puss-in-Boots-The-Last-Wish-(2022)-Hindi-ORG-Dubbed-BluRay"},

    {name:"Cars (2011) ",img:"https://imgshare.info/images/2025/06/05/Cars-2-2011.jpg", link1:"https://drive.google.com/file/d/1PbGxWmBiJ2rQs5AsPKmBU0IVZNFLSEFs/view", link2:"https://ddl2.cloudserver-1692956285.workers.dev/1397967876/117db813001658f3145bd09ae824ff63ac8da401fef621f0fcda6ccf85481b12f66c4011995ecb84a68c6ce04b7b1fab3bead4f80c8c39c95ccb00634e92f21db522f6d3590481e2e46307cd5c93acdd36bc2ff02745e428830e2804a161e118a3cb1ee91ad8a6b1e98b2825e2b38697096426f42c711d8573ce4c7fd8dc4600::5724ae75cee951f0d32df02219dbdd96/Cars.2.2011.1080p.BluRay.Hindi.English.DD.2.0.x264.ESubs.mkv?token=1775271221"},
    {name:"Cars (2017) ",img:"https://imgshare.info/images/2025/06/05/Cars-3-2017.jpg", link1:"https://drive.google.com/file/d/1QITgOjK-z6nGR3AQSQvUqhQe-D01ZGwo/view", link2:"https://pixeldrain.dev/u/N3bpVo53"},

// Add placeholder Hollywood 6-1000
for(let i=6;i<=100;i++){movies.push({name:"Hollywood "+i,img:`https://via.placeholder.com/300x450?text=Hollywood+${i}`,link1:"#",link2:"#"});}

// Grid batch loading
const grid=document.getElementById("movieGrid");
const batchSize=50;
let currentIndex=0;

function loadBatch(list=movies){
    const nextBatch=list.slice(currentIndex,currentIndex+batchSize);
    nextBatch.forEach(m=>{
        let box=document.createElement("div");
        box.className="movie fadeIn";
        box.innerHTML=`
            <img src="${m.img}" alt="${m.name}">
            <h3>${m.name}</h3>
            <a class="download hd" href="${m.link1}" target="_blank">Download HD</a>
            <a class="download sd" href="${m.link2}" target="_blank">Download SD</a>
        `;
        grid.appendChild(box);
        // touch effect
        box.addEventListener("touchstart", e=>{
            if(!e.target.classList.contains('download')) box.classList.add("active-touch");
        });
        box.addEventListener("touchend",()=>setTimeout(()=>box.classList.remove("active-touch"),300));
    });
    currentIndex+=batchSize;
}

// Initial load
loadBatch();

// Infinite scroll
window.addEventListener('scroll', ()=>{
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
        if(currentIndex<movies.length){
            loadBatch();
        }
    }
});

// Search
document.getElementById("searchInput").addEventListener("input",(e)=>{
    let q=e.target.value.toLowerCase();
    currentIndex=0;
    grid.innerHTML="";
    let filtered=movies.filter(m=>m.name.toLowerCase().includes(q));
    loadBatch(filtered);
});

// Music toggle
const musicBtn = document.getElementById('drawerMusicToggle');
const music = document.getElementById('bgMusic');
let isPlaying = false;
musicBtn.addEventListener('click', ()=>{
    if(!isPlaying){music.play().catch(()=>alert("Tap to play audio first")); musicBtn.innerHTML='<i class="fas fa-volume-up"></i> Playing';} 
    else {music.pause(); musicBtn.innerHTML='<i class="fas fa-music"></i> Music';}
    isPlaying = !isPlaying;
});

// Night mode
const nightBtn = document.getElementById('drawerNightToggle');
const toggleIcon = document.getElementById('drawerToggleIcon');
let nightMode = localStorage.getItem('nightMode')==='false'? false : true;
function applyMode(night){
    if(!night){
        document.documentElement.style.setProperty('--bg-color','#fff');
        document.documentElement.style.setProperty('--text-color','#111');
        document.documentElement.style.setProperty('--card-bg','rgba(0,0,0,0.05)');
        document.documentElement.style.setProperty('--highlight-color','#ff00aa');
        document.documentElement.style.setProperty('--search-bg','#eee');
        toggleIcon.textContent='☀️';
    } else {
        document.documentElement.style.setProperty('--bg-color','#111');
        document.documentElement.style.setProperty('--text-color','#fff');
        document.documentElement.style.setProperty('--card-bg','rgba(255,255,255,0.05)');
        document.documentElement.style.setProperty('--highlight-color','#00ff88');
        document.documentElement.style.setProperty('--search-bg','#222');
        toggleIcon.textContent='🌙';
    }
    localStorage.setItem('nightMode', night);
}
applyMode(nightMode);
nightBtn.addEventListener('click', ()=>{
    nightMode = !nightMode;
    applyMode(nightMode);
});
</script>
