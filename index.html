<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Image Gallery</title>
<style>
  body { background: #111; color: #0f0; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
  input, button { margin: 10px 0; padding: 8px; font-size: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; justify-content: center; margin-top: 20px; }
  .grid-item { background: #fff; width: 150px; height: 150px; position: relative; overflow: hidden; border: 1px solid #0f0; border-radius: 8px; }
  .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
  .grid-item:hover img { transform: scale(1.1); }
  .grid-item span { position: absolute; bottom: 0; background: rgba(0,0,0,0.6); color: #0f0; width: 100%; font-size: 14px; }
</style>
</head>
<body>

<h1>Public Image Gallery</h1>
<input type="file" id="imageInput" accept="image/*"><br>
<input type="text" id="nameInput" placeholder="Enter Your Name"><br>
<button onclick="uploadImage()">Upload</button>

<div class="grid" id="imageGrid"></div>

<script>
// Load gallery from localStorage
let imagesData = JSON.parse(localStorage.getItem('images')) || [];

// Display gallery on page load
window.onload = function() {
  reloadGrid();
}

// Add image to grid
function addImageToGrid(item) {
  const grid = document.getElementById('imageGrid');
  const div = document.createElement('div');
  div.className = 'grid-item';
  div.innerHTML = `
    <img src="${item.src}" alt="user image">
    <span>${item.name}</span>
  `;
  grid.appendChild(div);
}

// Upload new image
function uploadImage() {
  const fileInput = document.getElementById('imageInput');
  const nameInput = document.getElementById('nameInput');

  if(fileInput.files.length === 0 || nameInput.value === '') {
    alert("Please select image and enter your name!");
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    const src = e.target.result;
    const name = nameInput.value;

    // Add to gallery
    imagesData.push({ src, name });
    localStorage.setItem('images', JSON.stringify(imagesData));

    // Show on grid
    addImageToGrid({ src, name });
  }
  reader.readAsDataURL(file);

  fileInput.value = '';
  nameInput.value = '';
}

// Reload entire grid
function reloadGrid() {
  const grid = document.getElementById('imageGrid');
  grid.innerHTML = '';
  imagesData.forEach(item => addImageToGrid(item));
}
</script>

</body>
</html>
