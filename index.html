<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝗚𝗨𝗟𝗟 𝗞𝗛𝗔𝗡 𝗪𝗘𝗕 𝗦𝗘𝗥𝗩𝗘𝗥</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
    --bg-color: #111;
    --text-color: #fff;
    --card-bg: rgba(255,255,255,0.05);
    --highlight-color: #00ff88;
    --search-bg: #222;
    --download-hd: linear-gradient(90deg,#00ff88,#00cc55);
    --download-sd: linear-gradient(90deg,#00ccff,#0066ff);
}

/* ===== BODY ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    overflow-x:hidden;
    transition: background 0.7s ease, color 0.7s ease;
}

/* DRAWER - original rainbow/frosted style */
.drawer{
    position:fixed;
    top:0;
    left:0;
    width:0;
    height:45%;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(12px);
    overflow:hidden;
    z-index:1000;
    transition:0.4s;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:15px;
    padding-left:0px;
    border-radius:0 25px 300px 0;
}
.drawer::before{
    content:"";
    position:absolute;
    inset:0;
    padding:3px;
    border-radius:0 25px 500px 0;
    background:linear-gradient(270deg,#00ff88,#00ccff,#ff00ff,#00ff88);
    background-size:600% 600%;
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    animation:borderMove 6s linear infinite;
}
@keyframes borderMove{
    0%{background-position:0%}
    100%{background-position:200%}
}
.drawer a{
    padding:15px;
    font-size:30px;
    color: var(--highlight-color);
    text-decoration:none;
    display:block;
    transition:0.5s;
    z-index:1002;
    border-radius:10px;
}
.drawer a:hover{
    background:rgba(0,255,136,0.2);
    color:#fff;
}
.closebtn{
    position:absolute;
    right:15px;
    top:10px;
    font-size:100px;
    cursor:pointer;
    z-index:1003;
}

/* OPEN DRAWER BUTTON */
#openDrawerBtn{
    position:fixed;
    top:15px;
    left:15px;
    font-size:40px;
    background:linear-gradient(45deg,#00ff88,#00ccff);
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    z-index:1001;
}

/* TITLE */
h1{text-align:center;font-size:80px;margin-top:80px;}
.rainbow-text{
    font-weight:bold;
    background:linear-gradient(90deg,red,magenta,blue,cyan,green,yellow,red);
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:100%}100%{background-position:-100%}}

/* SEARCH BAR */
.search-container{text-align:center;margin:20px;}
.search-container input{
    width:600%;
    max-width:700px;
    padding:35px;
    font-size:35px;
    border-radius:15px;
    border:none;
    background: var(--search-bg);
    color: var(--text-color);
}

/* MOVIE GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

/* MOVIE CARD */
.movie{
    background: var(--card-bg);
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    transition:0.7s;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}
.movie img{
    width:100%;
    height:450px;
    object-fit:cover;
}
.movie h3 {
    font-size:30px;
    font-weight:bold;
    color: var(--highlight-color);
    margin:12px 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* Card touch effect */
.movie.active-touch::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,rgba(255,255,255,0.8),transparent);
    animation:slide 0.5s;
    border-radius:15px;
}
@keyframes slide{from{left:-100%}to{left:100%}}

/* DOWNLOAD BUTTONS */
.download {
    display: block;
    margin: 8px auto 15px auto;
    padding: 10px 45px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 25px;
    text-align:center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.7s ease, background 0.7s ease, color 0.7s ease;
    color:#fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.download.hd {background: var(--download-hd);}
.download.sd {background: var(--download-sd);}
.download:active{transform:scale(0.95);}

/* Ripple effect */
.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple-effect 0.6s linear forwards;
    pointer-events:none;
    opacity:0.5;
}
@keyframes ripple-effect{to{transform:scale(6);opacity:0;}}

/* FADE-IN */
.fadeIn{opacity:0;transform:translateY(20px);animation:fadeUp 0.6s forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

</style>
</head>
<body>

<!-- DRAWER -->
<div id="myDrawer" class="drawer">
    <a href="javascript:void(0)" id="drawerNightToggle"><i id="drawerToggleIcon">🌙</i> Night Mode</a>
    <a href="https://www.youtube.com/" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
    <a href="https://www.facebook.com/share/1BTtkqEN28/" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
    <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
    <a href="https://whatsapp.com/channel/0029VbCbSoPCMY0JBsgwbx2q" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    <a href="https://www.tiktok.com/@pathanwala1?_r=1&_t=ZS-959EeyqQEza" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
    <a href="#" onclick="shareWebsite()"><i class="fas fa-share-alt"></i> Share</a>

    <!-- MUSIC & NIGHT MODE INSIDE DRAWER -->
    <a href="javascript:void(0)" id="drawerMusicToggle"><i class="fas fa-music"></i> Music</a>


    <span class="closebtn" onclick="closeDrawer()">×</span>
</div>

<button id="openDrawerBtn" onclick="openDrawer()">☰</button>

<!-- BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
    <source src="https://raw.githubusercontent.com/gullnoor596-svg/Gullkhanwebserver/main/Modern%20Talking%20-%20Cheri%20Cheri%20Lady%20(Lyrics)(720P_HD)(mp3).mp3" type="audio/mpeg">
</audio>

<h1><span class="rainbow-text">𝗚𝗨𝗟𝗟 𝗞𝗛𝗔𝗡 𝗪𝗘𝗕</span></h1>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search movies...">
</div>

<div class="grid" id="movieGrid"></div>

<script>
// Drawer
function openDrawer(){document.getElementById("myDrawer").style.width="300px";}
function closeDrawer(){document.getElementById("myDrawer").style.width="0";}

// Share
function shareWebsite(){
    const url = "https://gullnoor596-svg.github.io/MoviesServer/";
    if(navigator.share){navigator.share({title:"GULLKHAN WEBSITE",text:"Check this website!",url:url});}
    else if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert("Link copied!"));}
    else{prompt("Copy this link:",url);}
}

// Movies
let movies=[
    {name:"V for Vendetta", img:"https://m.media-amazon.com/images/M/MV5BOTI5ODc3NzExNV5BMl5BanBnXkFtZTcwNzYxNzQzMw@@._V1_.jpg", link1:"https://hub.pizzacdn.buzz/f047ce7a424bb2de20b07e685d6cf3ed?token=1774952598123", link2:"https://pixeldrain.dev/u/XJcPnuBR"},
    {name:"The Green Mile", img:"https://mp4moviez.football/cover/the-green-mile-(1999)-hindi-dubbed-movie.jpg", link1:"https://pixeldrain.dev/u/zHthfKXo", link2:"https://drive.google.com/file/d/1s5L4J-_oShZZGP0lhTgIz-mKJT23K0p0/view?pli=1"},
    {name:"The Spiderwick Chronicles", img:"https://images.justwatch.com/poster/183682366/s718/the-spiderwick-chronicles.jpg", link1:"https://jio1.fastxmp4.com/download/22291/The-Spiderwick-Chronicles-(2008)-Hindi-Dubbed-BluRay--720p-[Orgmovies].mp4?st=nVtysLhNcZtT-rPCdN4s4w&e=1775060618", link2:"https://111.90.159.132/family/the-spiderwick-chronicles-12122023/"}
];
for(let i=4;i<=15;i++){
    movies.push({name:"Hollywood "+i,img:`https://via.placeholder.com/300x450`,link1:`#`,link2:`#`});
}
let grid=document.getElementById("movieGrid");
function loadMovies(list){
    grid.innerHTML="";
    list.forEach(m=>{
        let box=document.createElement("div");
        box.className="movie fadeIn";
        box.innerHTML=`
            <img src="${m.img}" alt="${m.name}">
            <h3>${m.name}</h3>
            <a class="download hd" href="${m.link1}" target="_blank">Download HD</a>
            <a class="download sd" href="${m.link2}" target="_blank">Download SD</a>
        `;
        grid.appendChild(box);

        box.addEventListener("touchstart", e=>{
            if(!e.target.classList.contains('download')) box.classList.add("active-touch");
        });
        box.addEventListener("touchend",()=>setTimeout(()=>box.classList.remove("active-touch"),300));
    });
}
loadMovies(movies);

// Search
document.getElementById("searchInput").addEventListener("input",(e)=>{
    let q=e.target.value.toLowerCase();
    loadMovies(movies.filter(m=>m.name.toLowerCase().includes(q)));
});

// Ripple effect
document.addEventListener('click', function(e){
    if(e.target.classList.contains('download')){
        e.stopPropagation();
        const btn = e.target;
        const ripple = document.createElement('span');
        ripple.className='ripple';
        ripple.style.background = btn.classList.contains('hd') ? 'rgba(0,255,136,0.5)' : 'rgba(0,204,255,0.5)';

        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width,rect.height)*2.5;
        ripple.style.width = ripple.style.height = size+'px';
        ripple.style.left = (e.clientX - rect.left - size/2)+'px';
        ripple.style.top = (e.clientY - rect.top - size/2)+'px';

        btn.appendChild(ripple);
        ripple.addEventListener('animationend', ()=>ripple.remove());
    }
});

// MUSIC TOGGLE
const musicBtn = document.getElementById('drawerMusicToggle');
const music = document.getElementById('bgMusic');
let isPlaying = false;
musicBtn.addEventListener('click', ()=>{
    isPlaying ? music.pause() : music.play();
    musicBtn.innerHTML = isPlaying ? '<i class="fas fa-music"></i> Music' : '<i class="fas fa-volume-up"></i> Playing';
    isPlaying = !isPlaying;
});

// NIGHT MODE TOGGLE
const nightBtn = document.getElementById('drawerNightToggle');
const toggleIcon = document.getElementById('drawerToggleIcon');
let nightMode = localStorage.getItem('nightMode')==='false'? false : true;

function applyMode(night){
    if(!night){
        document.documentElement.style.setProperty('--bg-color','#fff');
        document.documentElement.style.setProperty('--text-color','#111');
        document.documentElement.style.setProperty('--card-bg','rgba(0,0,0,0.05)');
        document.documentElement.style.setProperty('--highlight-color','#ff00aa');
        document.documentElement.style.setProperty('--search-bg','#eee');
        toggleIcon.textContent='☀️';
    } else {
        document.documentElement.style.setProperty('--bg-color','#111');
        document.documentElement.style.setProperty('--text-color','#fff');
        document.documentElement.style.setProperty('--card-bg','rgba(255,255,255,0.05)');
        document.documentElement.style.setProperty('--highlight-color','#00ff88');
        document.documentElement.style.setProperty('--search-bg','#222');
        toggleIcon.textContent='🌙';
    }
    localStorage.setItem('nightMode', night);
}
applyMode(nightMode);
nightBtn.addEventListener('click', ()=>{
    nightMode = !nightMode;
    applyMode(nightMode);
});
</script>
</body>
</html>
