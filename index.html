<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝗚𝗨𝗟𝗟 𝗞𝗛𝗔𝗡 𝗪𝗘𝗕 𝗦𝗘𝗥𝗩𝗘𝗥</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#111;
    color:#fff;
    overflow-x:hidden;
}

/* DRAWER */
.drawer{
    position:fixed;
    top:0;
    left:0;
    width:0;
    height:30%;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(12px);
    overflow:hidden;
    z-index:1000;
    transition:0.4s;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:15px;
    padding-left:0px;
    border-radius:0 25px 25px 0;
}
.drawer::before{
    content:"";
    position:absolute;
    inset:0;
    padding:3px;
    border-radius:0 25px 25px 0;
    background:linear-gradient(270deg,#00ff88,#00ccff,#ff00ff,#00ff88);
    background-size:600% 600%;
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    animation:borderMove 6s linear infinite;
}
@keyframes borderMove{
    0%{background-position:0%}
    100%{background-position:200%}
}
.drawer a{
    padding:12px;
    font-size:22px;
    color:#00ff88;
    text-decoration:none;
    display:block;
    transition:0.3s;
    z-index:1002;
}
.drawer a:hover{
    background:rgba(0,255,136,0.2);
    color:#fff;
}
.closebtn{
    position:absolute;
    right:15px;
    top:10px;
    font-size:30px;
    cursor:pointer;
    z-index:1003;
}

/* OPEN DRAWER BUTTON */
#openDrawerBtn{
    position:fixed;
    top:15px;
    left:15px;
    font-size:30px;
    background:linear-gradient(45deg,#00ff88,#00ccff);
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    z-index:1001;
}

/* TITLE */
h1{text-align:center;font-size:50px;margin-top:80px;}
.rainbow-text{
    font-weight:bold;
    background:linear-gradient(90deg,red,magenta,blue,cyan,green,yellow,red);
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:100%}100%{background-position:-100%}}

/* SEARCH BAR */
.search-container{text-align:center;margin:20px;}
.search-container input{
    width:60%;
    max-width:700px;
    padding:15px;
    font-size:20px;
    border-radius:15px;
    border:none;
    background:#222;
    color:#fff;
}

/* MOVIE GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:20px;
    padding:20px;
}

/* MOVIE CARD */
.movie{
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    transition:0.3s;
    position:relative;
}
.movie img{width:100%;height:750px;object-fit:cover;}
.movie.active-touch::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,rgba(255,255,255,0.8),transparent);
    animation:slide 0.5s;
    border-radius:15px;
}
@keyframes slide{from{left:-100%}to{left:100%}}

/* DOWNLOAD BUTTONS */
.download {
    display: block;
    margin: 6px;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s;
    color:#fff;
}
.download.hd{background: linear-gradient(90deg,#00ff88,#00cc55);}
.download.sd{background: linear-gradient(90deg,#00ccff,#0066ff);}
.download:active{transform:scale(0.95);}

/* Ripple effect */
.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple-effect 0.6s linear forwards;
    pointer-events:none;
    opacity:0.5;
}
@keyframes ripple-effect{
    to{transform:scale(6);opacity:0;}
}

/* FADE-IN */
.fadeIn{opacity:0;transform:translateY(20px);animation:fadeUp 0.6s forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- DRAWER -->
<div id="myDrawer" class="drawer">
    <a href="https://www.youtube.com/" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
    <a href="https://www.facebook.com/" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
    <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
    <a href="https://www.tiktok.com/@YourProfile" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
    <a href="#" onclick="shareWebsite()"><i class="fas fa-share-alt"></i> Share</a>
    <span class="closebtn" onclick="closeDrawer()">×</span>
</div>

<button id="openDrawerBtn" onclick="openDrawer()">☰</button>

<h1><span class="rainbow-text">𝗚𝗨𝗟𝗟 𝗞𝗛𝗔𝗡 𝗪𝗘𝗕</span></h1>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search movies...">
</div>

<div class="grid" id="movieGrid"></div>

<script>
// Drawer
function openDrawer(){document.getElementById("myDrawer").style.width="300px";}
function closeDrawer(){document.getElementById("myDrawer").style.width="0";}

// Share
function shareWebsite(){
    const url = "https://gullnoor596-svg.github.io/MoviesServer/";
    if(navigator.share){navigator.share({title:"GULLKHAN WEB",text:"Check this website!",url:url});}
    else if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert("Link copied!"));}
    else{prompt("Copy this link:",url);}
}

// Movies
let movies=[
    {name:"V for Vendetta", img:"https://m.media-amazon.com/images/M/MV5BOTI5ODc3NzExNV5BMl5BanBnXkFtZTcwNzYxNzQzMw@@._V1_.jpg", link1:"https://hub.pizzacdn.buzz/f047ce7a424bb2de20b07e685d6cf3ed?token=1774952598123", link2:"https://video-downloads.googleusercontent.com/ADGPM2msksuOEBQ0-LlBPOxMMefGyEvZSTOOYbYEZa-pDEBk_IGpZiWeCxjO73qHKsIuc9X1YFfInw_ygpO4DdyYn97OLFFmYVY_Gak_B8Cd1K_fkJcRICl3UsYAgCd2-rc72U20IazOlq7vATb0qcKqgXfzqhkXy1qHSOyjMf1OBVzaVD7Xwy9c9yUvmnuv_jwNllJfGSzfRS2Zw7fwe5dM6Qfz6d3yLg8NvC7yy-SasbDyuTdOMsIuYiEJW6GURKTf38khTEnS"},
    {name:"Hollywood 2", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg", link1:"videos/hollywood2_hd.mp4", link2:"videos/hollywood2_sd.mp4"},
    {name:"Hollywood 3", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg", link1:"videos/hollywood3_hd.mp4", link2:"videos/hollywood3_sd.mp4"}
];
for(let i=4;i<=20;i++){
    movies.push({name:"Hollywood "+i,img:"https://via.placeholder.com/300x400",link1:`videos/hollywood${i}_hd.mp4`,link2:`videos/hollywood${i}_sd.mp4`});
}

let grid=document.getElementById("movieGrid");
function loadMovies(list){
    grid.innerHTML="";
    list.forEach(m=>{
        let box=document.createElement("div");
        box.className="movie fadeIn";
        box.innerHTML=`
            <img src="${m.img}" alt="${m.name}">
            <h3>${m.name}</h3>
            <a class="download hd" href="${m.link1}" target="_blank">Download HD</a>
            <a class="download sd" href="${m.link2}" target="_blank">Download SD</a>
        `;
        grid.appendChild(box);

        // Card touch effect, ONLY if NOT clicking a download button
        box.addEventListener("touchstart", e=>{
            if(!e.target.classList.contains('download')){
                box.classList.add("active-touch");
            }
        });
        box.addEventListener("touchend",()=>setTimeout(()=>box.classList.remove("active-touch"),300));
    });
}
loadMovies(movies);

// Search
document.getElementById("searchInput").addEventListener("input",(e)=>{
    let q=e.target.value.toLowerCase();
    loadMovies(movies.filter(m=>m.name.toLowerCase().includes(q)));
});

// Ripple effect for Download buttons
document.addEventListener('click', function(e){
    if(e.target.classList.contains('download')){
        e.stopPropagation(); // STOP event from triggering card touch effect
        const btn = e.target;
        const ripple = document.createElement('span');
        ripple.className='ripple';
        ripple.style.background = btn.classList.contains('hd') ? 'rgba(0,255,136,0.5)' : 'rgba(0,204,255,0.5)';

        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width,rect.height)*2.5;
        ripple.style.width = ripple.style.height = size+'px';
        ripple.style.left = (e.clientX - rect.left - size/2)+'px';
        ripple.style.top = (e.clientY - rect.top - size/2)+'px';

        btn.appendChild(ripple);
        ripple.addEventListener('animationend', ()=>ripple.remove());
    }
});
</script>
</body>
</html>
