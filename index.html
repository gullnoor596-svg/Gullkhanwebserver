<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Shared Gallery</title>
<style>
  body { background: #111; color: #0f0; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
  input, button { margin: 10px 0; padding: 8px; font-size: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; justify-content: center; margin-top: 20px; }
  .grid-item { background: #fff; width: 150px; height: 150px; position: relative; overflow: hidden; border: 1px solid #0f0; border-radius: 8px; }
  .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
  .grid-item:hover img { transform: scale(1.1); }
  .grid-item span { position: absolute; bottom: 0; background: rgba(0,0,0,0.6); color: #0f0; width: 100%; font-size: 14px; }
</style>
</head>
<body>

<h1>Public Shared Gallery</h1>
<input type="file" id="imageInput" accept="image/*"><br>
<input type="text" id="nameInput" placeholder="Enter Your Name"><br>
<button onclick="uploadImage()">Upload</button>

<div class="grid" id="imageGrid"></div>

<!-- Firebase Libraries -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// 🔹 Initialize Firebase
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "SENDER_ID",
  appId: "APP_ID",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();
const database = firebase.database();

// 🔹 Upload Image Function
function uploadImage() {
  const fileInput = document.getElementById('imageInput');
  const nameInput = document.getElementById('nameInput');

  if(fileInput.files.length === 0 || nameInput.value.trim() === '') {
    alert("Please select an image and enter your name!");
    return;
  }

  const file = fileInput.files[0];
  const storageRef = storage.ref('images/' + Date.now() + '_' + file.name);

  storageRef.put(file).then(snapshot => {
    snapshot.ref.getDownloadURL().then(url => {
      database.ref('images').push({
        name: nameInput.value,
        url: url,
        timestamp: Date.now()
      });
      fileInput.value = '';
      nameInput.value = '';
    });
  });
}

// 🔹 Display All Images in Real-Time
database.ref('images').on('value', snapshot => {
  const gallery = document.getElementById('imageGrid');
  gallery.innerHTML = '';
  snapshot.forEach(child => {
    const data = child.val();
    const div = document.createElement('div');
    div.className = 'grid-item';
    div.innerHTML = `<img src="${data.url}" alt="image"><span>${data.name}</span>`;
    gallery.appendChild(div);
  });
});
</script>

</body>
</html>
